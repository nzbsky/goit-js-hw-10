<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 2 – Promise Generator</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #1a1a2e;
        color: #eee;
      }

      h1 {
        margin-bottom: 32px;
      }

      .form {
        display: flex;
        flex-direction: column;
        gap: 20px;
        background: #16213e;
        padding: 32px;
        border-radius: 12px;
        min-width: 320px;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 14px;
        color: #aaa;
      }

      input[type='number'] {
        padding: 8px 12px;
        font-size: 16px;
        border-radius: 6px;
        border: 1px solid #4e75ff;
        background: #1a1a2e;
        color: #eee;
      }

      fieldset {
        border: 1px solid #4e75ff;
        border-radius: 6px;
        padding: 12px 16px;
      }

      legend {
        padding: 0 6px;
        color: #aaa;
        font-size: 14px;
      }

      fieldset label {
        flex-direction: row;
        align-items: center;
        gap: 8px;
        color: #eee;
        font-size: 16px;
        cursor: pointer;
      }

      button[type='submit'] {
        padding: 10px;
        font-size: 16px;
        border-radius: 6px;
        border: none;
        background: #4e75ff;
        color: #fff;
        cursor: pointer;
        transition: background 0.2s;
      }

      button[type='submit']:hover {
        background: #3a5cd4;
      }
    </style>
  </head>
  <body>
    <h1>Promise Generator</h1>

    <form class="form">
      <label>
        Delay (ms)
        <input type="number" name="delay" min="0" required />
      </label>

      <fieldset>
        <legend>State</legend>
        <label>
          <input type="radio" name="state" value="fulfilled" required />
          Fulfilled
        </label>
        <label>
          <input type="radio" name="state" value="rejected" required />
          Rejected
        </label>
      </fieldset>

      <button type="submit">Create notification</button>
    </form>

    <script type="module" src="./2-snackbar.js"></script>
  </body>
</html>
